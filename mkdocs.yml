site_name: Project Prospector
site_description: >-
  A Claude Code skill that catalogs and ranks everything you've built or
  sketched on a machine — parallel read-only agents, blind-spot pass, tiered
  ranking by idea-novelty and leverage.
site_url: https://88plug.github.io/project-prospector/
repo_url: https://github.com/88plug/project-prospector
repo_name: 88plug/project-prospector
edit_uri: edit/main/docs/
use_directory_urls: true
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/88plug/project-prospector
